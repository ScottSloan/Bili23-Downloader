name: Publish release

on:
  workflow_dispatch:
  push:
    # branches:
    #   - dev
    tags:
      - "v*"

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.set-version.outputs.VERSION }}
      VERSION_NAME: ${{ steps.set-version.outputs.VERSION_NAME }}
    steps:
      - name: Set version
        id: set-version
        run: |
          # echo "VERSION=$(echo ${GITHUB_REF#refs/tags/v} | sed 's/-rc.*//')" >> $GITHUB_OUTPUT
          # echo "VERSION_NAME=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

          echo "VERSION=2.00.2" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=2.00.2" >> $GITHUB_OUTPUT

  windows-build:
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      VERSION_NAME: ${{ needs.get-version.outputs.VERSION_NAME }}
    outputs:
      VERSION: ${{ env.VERSION }}
      VERSION_NAME: ${{ env.VERSION_NAME }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          architecture: 'x64'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==4.0.8

      - name: Compile source code with nuitka
        run: |
          python -m nuitka --module src\main.py --include-package=main --show-progress --mingw64 --output-dir=./dist/dist-main --assume-yes-for-downloads
          python -m nuitka --module src\gui --include-package=gui --show-progress --mingw64 --output-dir=./dist/dist-gui
          python -m nuitka --module src\util --include-package=util --show-progress --mingw64 --output-dir=./dist/dist-util
          python -m nuitka --module src\res --include-package=res --show-progress --mingw64 --output-dir=./dist/dist-res

      - name: Install Inno Setup and Chinese language pack
        run: |
          # 安装 Inno Setup
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "is.exe"
          Start-Process "is.exe" -Wait -ArgumentList "/VERYSILENT"

          # 简中语言包
          $lang_zh_cn_url = "https://raw.githubusercontent.com/jrsoftware/issrc/refs/heads/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $lang_zh_cn_url -OutFile "ChineseSimplified.isl"
          Move-Item -Path "ChineseSimplified.isl" -Destination "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"

          # 繁中语言包
          $lang_zh_tw_url = "https://raw.githubusercontent.com/jrsoftware/issrc/refs/heads/main/Files/Languages/Unofficial/ChineseTraditional.isl"
          Invoke-WebRequest -Uri $lang_zh_tw_url -OutFile "ChineseTraditional.isl"
          Move-Item -Path "ChineseTraditional.isl" -Destination "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseTraditional.isl"

      - name: Prepare Windows 10/11 runtime
        run: |
          # 下载 Python 静态运行时环境
          Invoke-WebRequest -Uri "https://github.com/ScottSloan/Python-Static/releases/download/v0.0.5/windows_x64_runtime.zip" -OutFile windows_x64_runtime.zip
          
          Expand-Archive windows_x64_runtime.zip -DestinationPath Bili23-Downloader

          New-Item -ItemType Directory -Force -Path Bili23-Downloader\script

          python -m compileall Bili23-Downloader\site-packages\

      - name: Copy compiled modules to script folder
        run: |
          # 将编译后的模块复制到 script 文件夹
          Copy-Item -Path dist\dist-main\main.cp312-win_amd64.pyd -Destination Bili23-Downloader\script\main.cp312-win_amd64.pyd -Force
          Copy-Item -Path dist\dist-gui\gui.cp312-win_amd64.pyd -Destination Bili23-Downloader\script\gui.cp312-win_amd64.pyd -Force
          Copy-Item -Path dist\dist-util\util.cp312-win_amd64.pyd -Destination Bili23-Downloader\script\util.cp312-win_amd64.pyd -Force
          Copy-Item -Path dist\dist-res\res.cp312-win_amd64.pyd -Destination Bili23-Downloader\script\res.cp312-win_amd64.pyd -Force

      - name: Package Windows version
        run: |
          # 便携版：直接打包为 zip
          Compress-Archive -Path Bili23-Downloader\* -DestinationPath Bili23-Downloader_${{ env.VERSION_NAME }}_windows_x64_portable.zip

          # 安装版：使用 Inno Setup 创建安装程序
          Copy-Item -Path "assets\setup.iss" -Destination ".\"

          $inno = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $script = ".\setup.iss"

          & $inno "$script"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-artifacts
          path: |
            Bili23-Downloader_${{ env.VERSION_NAME }}_windows_x64_portable.zip
            Bili23-Downloader_${{ env.VERSION_NAME }}_windows_x64.exe

      - name: Clean up files
        run: |
          Remove-Item -Path Bili23-Downloader -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path windows_x64_runtime.zip -Force -ErrorAction SilentlyContinue
          Remove-Item -Path Bili23-Downloader_${{ env.VERSION_NAME }}_windows_x64_portable.zip -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path Bili23-Downloader_${{ env.VERSION_NAME }}_windows_x64.exe -Recurse -Force -ErrorAction SilentlyContinue

      - name: Prepare Windows 7 runtime
        run: |
          # 下载 Python 静态运行时环境
          Invoke-WebRequest -Uri "https://github.com/ScottSloan/Python-Static/releases/download/v0.0.5/windows_x64_runtime_for_win7.zip" -OutFile windows_x64_runtime_for_win7.zip
          
          Expand-Archive windows_x64_runtime_for_win7.zip -DestinationPath Bili23-Downloader

          New-Item -ItemType Directory -Force -Path Bili23-Downloader\script

          python -m compileall Bili23-Downloader\site-packages\

      - name: Copy compiled modules to script folder for Windows 7
        run: |
          # 将编译后的模块复制到 script 文件夹
          Copy-Item -Path dist\dist-main\main.cp312-win_amd64.pyd -Destination Bili23-Downloader\script\main.cp312-win_amd64.pyd -Force
          Copy-Item -Path dist\dist-gui\gui.cp312-win_amd64.pyd -Destination Bili23-Downloader\script\gui.cp312-win_amd64.pyd -Force
          Copy-Item -Path dist\dist-util\util.cp312-win_amd64.pyd -Destination Bili23-Downloader\script\util.cp312-win_amd64.pyd -Force
          Copy-Item -Path dist\dist-res\res.cp312-win_amd64.pyd -Destination Bili23-Downloader\script\res.cp312-win_amd64.pyd -Force

      - name: Package Windows 7 version
        run: |
          # 使用 Inno Setup 创建安装程序

          $inno = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $script = ".\setup.iss"

          & $inno "$script"

          # 重命名文件
          Rename-Item -Path "Bili23-Downloader_${{ env.VERSION_NAME }}_windows_x64.exe" -NewName "Bili23-Downloader_${{ env.VERSION_NAME }}_windows_x64_for_win7.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-artifacts-for-win7
          path: |
            Bili23-Downloader_${{ env.VERSION_NAME }}_windows_x64_for_win7.exe
  
  linux-build:
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      VERSION_NAME: ${{ needs.get-version.outputs.VERSION_NAME }}
    outputs:
      VERSION: ${{ env.VERSION }}
      VERSION_NAME: ${{ env.VERSION_NAME }}
    strategy:
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
            arch_suffix: x86_64
            chroot_distro: focal
            source_url: http://archive.ubuntu.com/ubuntu/

          - arch: arm64
            os: ubuntu-24.04-arm
            arch_suffix: aarch64
            chroot_distro: noble
            source_url: http://ports.ubuntu.com/ubuntu-ports/

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare Ubuntu chroot environment
        run: |
          sudo apt update
          sudo apt install -y debootstrap

          sudo debootstrap --arch=${{ matrix.arch }} ${{ matrix.chroot_distro }} ~/ubuntu-rootfs ${{ matrix.source_url }}

          sudo mkdir -p ~/ubuntu-rootfs/workspace

          # chroot 挂载
          sudo mount --bind /dev ~/ubuntu-rootfs/dev
          sudo mount --bind /proc ~/ubuntu-rootfs/proc
          sudo mount --bind /sys ~/ubuntu-rootfs/sys
          sudo mount --bind /etc/resolv.conf ~/ubuntu-rootfs/etc/resolv.conf
          sudo mount --bind "$GITHUB_WORKSPACE" ~/ubuntu-rootfs/workspace

          # 进入 chroot 环境，安装必要的依赖
          sudo chroot ~/ubuntu-rootfs /bin/bash -lc '
          cd /workspace

          apt update
          apt install -y build-essential wget ca-certificates

          wget https://github.com/ScottSloan/Python-Static/releases/download/v0.0.1-deb/python3.12-linux-${{ matrix.arch }}.deb

          dpkg -i python3.12-linux-${{ matrix.arch }}.deb

          /opt/python-static/bin/python3.12 -m ensurepip
          /opt/python-static/bin/python3.12 -m pip install --upgrade pip

          /opt/python-static/bin/python3.12 -m pip install nuitka==4.0.8
          /opt/python-static/bin/python3.12 -m pip install PySide6==6.9.3
          /opt/python-static/bin/python3.12 -m pip install protobuf httpx qrcode Pillow PySide6-Fluent-Widgets

          /opt/python-static/bin/python3.12 -m nuitka --module src/main.py --include-package=main --show-progress --output-dir=./dist/dist-main --assume-yes-for-downloads
          /opt/python-static/bin/python3.12 -m nuitka --module src/gui --include-package=gui --show-progress --output-dir=./dist/dist-gui
          /opt/python-static/bin/python3.12 -m nuitka --module src/util --include-package=util --show-progress --output-dir=./dist/dist-util
          /opt/python-static/bin/python3.12 -m nuitka --module src/res --include-package=res --show-progress --output-dir=./dist/dist-res
          '

          # 退出 chroot 环境，卸载挂载点
          sudo umount ~/ubuntu-rootfs/dev
          sudo umount ~/ubuntu-rootfs/proc
          sudo umount ~/ubuntu-rootfs/sys
          sudo umount ~/ubuntu-rootfs/etc/resolv.conf
          sudo umount ~/ubuntu-rootfs/workspace

      - name: Prepare Linux runtime
        run: |
          # 下载 Python 静态运行时环境
          wget https://github.com/ScottSloan/Python-Static/releases/download/v0.0.5/linux_${{ matrix.arch }}_runtime.zip

          unzip linux_${{ matrix.arch }}_runtime.zip -d Bili23-Downloader

          chmod +x Bili23-Downloader/bili23-downloader
          chmod +x Bili23-Downloader/bundle/ffmpeg
          chmod +x Bili23-Downloader/runtime/python3.12

          mkdir -p Bili23-Downloader/script

      - name: Copy compiled modules to script folder
        run: |
          # 将编译后的模块复制到 script 文件夹
          cp dist/dist-main/main.cpython-312-${{ matrix.arch_suffix }}-linux-gnu.so Bili23-Downloader/script/main.cpython-312-${{ matrix.arch_suffix }}-linux-gnu.so
          cp dist/dist-gui/gui.cpython-312-${{ matrix.arch_suffix }}-linux-gnu.so Bili23-Downloader/script/gui.cpython-312-${{ matrix.arch_suffix }}-linux-gnu.so
          cp dist/dist-util/util.cpython-312-${{ matrix.arch_suffix }}-linux-gnu.so Bili23-Downloader/script/util.cpython-312-${{ matrix.arch_suffix }}-linux-gnu.so
          cp dist/dist-res/res.cpython-312-${{ matrix.arch_suffix }}-linux-gnu.so Bili23-Downloader/script/res.cpython-312-${{ matrix.arch_suffix }}-linux-gnu.so

      - name: Package Linux version
        run: |
          # 便携版：直接打包为 tar.gz
          tar -czvf Bili23-Downloader_${{ env.VERSION_NAME }}_linux_${{ matrix.arch }}_portable.tar.gz Bili23-Downloader

          # deb 包：需要创建 deb 包结构
          mkdir -p buildroot/DEBIAN
          mkdir -p buildroot/usr/local/bin
          mkdir -p buildroot/usr/share/applications
          mkdir -p buildroot/usr/share/icons/hicolor/scalable/apps
          mkdir -p buildroot/opt/Bili23-Downloader

          cp -r Bili23-Downloader buildroot/opt/
          cp src/res/icon/app.svg buildroot/usr/share/icons/hicolor/scalable/apps/bili23-downloader.svg

          # control 文件
          echo "Package: bili23-downloader" > buildroot/DEBIAN/control
          echo "Version: ${{ env.VERSION_NAME }}" >> buildroot/DEBIAN/control
          echo "Architecture: ${{ matrix.arch }}" >> buildroot/DEBIAN/control
          echo "Section: utils" >> buildroot/DEBIAN/control
          echo "Priority: optional" >> buildroot/DEBIAN/control
          echo "Maintainer: Scott Sloan <world1019@sina.com>" >> buildroot/DEBIAN/control
          echo "Description: A cross-platform video downloader for Bilibili" >> buildroot/DEBIAN/control
          echo "Depends: libc6 (>= 2.28), libxcb-cursor0" >> buildroot/DEBIAN/control
          echo "Homepage: https://bili23.scott-sloan.cn" >> buildroot/DEBIAN/control
          echo "License: GPL-3.0" >> buildroot/DEBIAN/control
          echo "Installed-Size: $(du -s Bili23-Downloader | cut -f1)" >> buildroot/DEBIAN/control

          # desktop 文件
          cat << 'EOF' > buildroot/usr/share/applications/bili23-downloader.desktop
          [Desktop Entry]
          Type=Application
          Name=Bili23 Downloader
          Exec=/usr/local/bin/bili23-downloader
          Icon=bili23-downloader
          Categories=Utility;
          Terminal=false
          Comment=A cross-platform video downloader for Bilibili
          EOF

          # 入口文件
          cat << 'EOF' > buildroot/usr/local/bin/bili23-downloader
          #!/bin/bash
          cd /opt/Bili23-Downloader
          exec ./bili23-downloader "$@"
          EOF

          chmod +x buildroot/usr/local/bin/bili23-downloader

          dpkg-deb --build buildroot Bili23-Downloader_${{ env.VERSION_NAME }}_linux_${{ matrix.arch }}.deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-${{ matrix.arch }}-artifacts
          path: |
            Bili23-Downloader_${{ env.VERSION_NAME }}_linux_${{ matrix.arch }}_portable.tar.gz
            Bili23-Downloader_${{ env.VERSION_NAME }}_linux_${{ matrix.arch }}.deb

  macos-build:
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
      VERSION_NAME: ${{ needs.get-version.outputs.VERSION_NAME }}
    outputs:
      VERSION: ${{ env.VERSION }}
      VERSION_NAME: ${{ env.VERSION_NAME }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            os: macos-15-intel
            python_arch: x64
            
          - arch: aarch64
            os: macos-latest
            python_arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          brew install create-dmg

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
          architecture: ${{ matrix.python_arch }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka==4.0.8

      - name: Compile source code with nuitka
        run: |
          export MACOSX_DEPLOYMENT_TARGET=12.0

          python -m nuitka --module src/main.py --include-package=main --show-progress --output-dir=./dist/dist-main --assume-yes-for-downloads
          python -m nuitka --module src/gui --include-package=gui --show-progress --output-dir=./dist/dist-gui
          python -m nuitka --module src/util --include-package=util --show-progress --output-dir=./dist/dist-util
          python -m nuitka --module src/res --include-package=res --show-progress --output-dir=./dist/dist-res

      - name: Prepare macOS runtime
        run: |
          # 下载 Python 静态运行时环境
          wget https://github.com/ScottSloan/Python-Static/releases/download/v0.0.5/macos_${{ matrix.arch }}_runtime.zip

          unzip macos_${{ matrix.arch }}_runtime.zip -d Bili23-Downloader

          chmod +x Bili23-Downloader/bili23-downloader
          chmod +x Bili23-Downloader/bundle/ffmpeg
          chmod +x Bili23-Downloader/runtime/python3.12

          mkdir -p Bili23-Downloader/script

          python -m compileall Bili23-Downloader/runtime/site-packages/

      - name: Copy compiled modules to script folder
        run: |
          # 将编译后的模块复制到 script 文件夹
          cp dist/dist-main/main.cpython-312-darwin.so Bili23-Downloader/script/main.cpython-312-darwin.so
          cp dist/dist-gui/gui.cpython-312-darwin.so Bili23-Downloader/script/gui.cpython-312-darwin.so
          cp dist/dist-util/util.cpython-312-darwin.so Bili23-Downloader/script/util.cpython-312-darwin.so
          cp dist/dist-res/res.cpython-312-darwin.so Bili23-Downloader/script/res.cpython-312-darwin.so

      - name: Package macOS version
        run: |
          # 先打包为 .app
          mkdir -p dmg_build/Bili23-Downloader.app/Contents/{MacOS,Resources}

          cp -r Bili23-Downloader/* dmg_build/Bili23-Downloader.app/Contents/Resources/
          cp assets/app.icns dmg_build/Bili23-Downloader.app/Contents/Resources/app.icns

          # Info.plist 文件
          cat << 'EOF' > dmg_build/Bili23-Downloader.app/Contents/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>main</string>
            <key>CFBundleIdentifier</key>
            <string>com.scottsloan.bili23</string>
            <key>CFBundleName</key>
            <string>Bili23 Downloader</string>
            <key>CFBundleIconFile</key>
            <string>app.icns</string>
            <key>CFBundleVersion</key>
            <string>${{ env.VERSION }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ env.VERSION_NAME }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>
          EOF

          # 入口文件
          cat << 'EOF' > dmg_build/Bili23-Downloader.app/Contents/MacOS/main
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          APP_RESOURCES="$SCRIPT_DIR/../Resources"
          cd "$APP_RESOURCES"
          exec ./bili23-downloader
          EOF

          chmod +x dmg_build/Bili23-Downloader.app/Contents/MacOS/main

          # 再打包为 dmg
          create-dmg \
            --volname "Bili23 Downloader Installer" \
            --window-pos 400 200 \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "Bili23-Downloader.app" 160 160 \
            --hide-extension "Bili23-Downloader.app" \
            --app-drop-link 500 160 \
            "Bili23-Downloader_${{ env.VERSION_NAME }}_macos_${{ matrix.arch }}.dmg" \
            "dmg_build/Bili23-Downloader.app/"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.arch }}-artifact
          path: Bili23-Downloader_${{ env.VERSION_NAME }}_macos_${{ matrix.arch }}.dmg
  
